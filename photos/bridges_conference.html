<!DOCTYPE html>
<html>
<head>
    <title>BRIDGES Conference Presentation</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .photo-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }
        .photo-cell {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .photo {
            max-width: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .photo:hover {
            transform: scale(1.02);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
        }
        @media (max-width: 700px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="photo-container">
        <h2>BRIDGES Conference - Poster Presentations (January 2025)</h2>
        <div class="photo-grid">
            <div class="photo-cell">
                <img class="photo" src="path_to_photo1.jpg" alt="Poster: Residential Battery Energy Storage System Optimization">
            </div>
            <div class="photo-cell">
                <img class="photo" src="path_to_photo2.jpg" alt="Poster: Statistical Sampling Techniques">
            </div>
        </div>
    </div>
</body>
</html>
